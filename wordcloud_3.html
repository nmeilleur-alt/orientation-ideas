<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Word Cloud</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f0f4f8; color: #333; padding: 30px 20px; }
    .container { max-width: 960px; margin: auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { color: #1a237e; text-align: center; font-weight: 600; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9em; margin-bottom: 24px; }

    .top-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .top-bar button { padding: 10px 20px; border: none; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 0.9em; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .top-bar button:hover { transform: translateY(-1px); }
    .btn-primary { background: #4f5b9d; color: white; }
    .btn-primary:hover { background: #394377; }
    .btn-secondary { background: #e3f2fd; color: #1a237e; }
    .btn-secondary:hover { background: #bbdefb; }
    .btn-danger { background: #fce4ec; color: #c62828; }
    .btn-danger:hover { background: #f8bbd0; }

    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }

    .manual-section p { font-size: 0.88em; color: #666; margin-bottom: 8px; }
    textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; font-size: 14px; resize: vertical; transition: border-color 0.2s; }
    textarea:focus { border-color: #4f5b9d; outline: none; }

    .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
    .controls label { font-weight: 600; font-size: 0.88em; white-space: nowrap; }
    input[type="number"] { width: 70px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; text-align: center; }
    input[type="text"] { flex: 1; min-width: 200px; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; font-size: 13px; }
    input[type="file"] { font-family: inherit; font-size: 13px; }

    #statsBar { background: #e3f2fd; padding: 10px 20px; border-radius: 8px; margin: 16px 0; font-size: 0.88em; display: flex; justify-content: space-around; font-weight: 600; color: #1a237e; border: 1px solid #bbdefb; }

    /* View toggle */
    .view-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 16px 0 8px; }
    .view-label { font-size: 0.85em; font-weight: 600; color: #888; transition: color 0.2s; }
    .view-label.active { color: #4f5b9d; }
    .toggle-arrow { background: #4f5b9d; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; }
    .toggle-arrow:hover { background: #394377; transform: scale(1.1); }

    /* Word cloud */
    #wordCloud { min-height: 280px; border: 2px dashed #bbdefb; background: #fafaff; padding: 30px 16px; border-radius: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .word-item { display: inline-block; cursor: help; font-weight: 600; opacity: 0; animation: fadeInScale 0.4s ease-out forwards; transition: transform 0.2s; }
    .word-item:hover { transform: scale(1.12) rotate(2deg); }
    .info-text { color: #999; font-size: 0.9em; text-align: center; width: 100%; }

    /* Bar chart */
    #barChart { display: none; min-height: 280px; padding: 10px 0; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { width: 160px; font-size: 13px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; font-weight: 600; }
    .bar-track { flex: 1; background: #f0f4f8; border-radius: 6px; height: 28px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 600; color: white; transition: width 0.6s ease; }
    .bar-count { font-size: 12px; color: #888; min-width: 28px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Idea Cloud ☁️</h1>
  <p class="subtitle">Pull ideas from your session or paste text manually</p>

  <!-- Load from Sheets -->
  <div class="top-bar">
    <button class="btn-primary" onclick="loadFromSheets()">⬇ Load from Google Sheets</button>
    <button class="btn-secondary" onclick="generateCloud()">Generate Cloud</button>
    <button class="btn-danger" onclick="clearAll()">Clear All</button>
    <input type="file" id="fileInput" accept=".txt,.xlsx">
  </div>

  <hr class="divider">

  <!-- Manual input -->
  <div class="manual-section">
    <p>Or paste text manually:</p>
    <textarea id="textInput" rows="4" placeholder="Ideas will appear here after loading from Sheets, or paste your own text..."></textarea>
  </div>

  <!-- Controls -->
  <div class="controls" style="margin-top: 14px;">
    <label>Phrase length:</label>
    <input type="number" id="phraseLength" value="1" min="1" max="5">
    <label>Ignore words:</label>
    <input type="text" id="stopWords" value="the, a, and, or, to, be, is, in, that, of, it, for, with, on, from, not, was, are">
  </div>

  <!-- Stats -->
  <div id="statsBar">
    <span>Total entries: <span id="totalWordCount">0</span></span>
    <span>Unique phrases: <span id="uniqueWordCount">0</span></span>
  </div>

  <!-- View toggle -->
  <div class="view-toggle">
    <span class="view-label active" id="label-cloud">Word cloud</span>
    <button class="toggle-arrow" onclick="toggleView()" title="Switch view">⇄</button>
    <span class="view-label" id="label-bar">Bar chart</span>
  </div>

  <!-- Word cloud view -->
  <div id="wordCloud">
    <p class="info-text">Load from Sheets or enter text above, then click Generate Cloud</p>
  </div>

  <!-- Bar chart view -->
  <div id="barChart"></div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-g-9r1IegrTiUjH_Ip8sCvfbzobFR6gwSSW09-do6-cWZZyevm3GRmQwX8PJTbTbaUg/exec";

  let currentView = "cloud";
  let lastPhrases = [];

  // --- Load from Google Sheets ---
  async function loadFromSheets() {
    const btn = document.querySelector(".btn-primary");
    btn.textContent = "Loading...";
    btn.disabled = true;
    try {
      const response = await fetch(APPS_SCRIPT_URL);
      const data = await response.json();
      if (data.ideas && data.ideas.length > 0) {
        document.getElementById("textInput").value = data.ideas.join("\n");
        generateCloud();
      } else {
        alert("No ideas found in the sheet yet.");
      }
    } catch (err) {
      alert("Could not load from Google Sheets. Make sure you have redeployed the updated script.");
      console.error(err);
    }
    btn.textContent = "⬇ Load from Google Sheets";
    btn.disabled = false;
  }

  // --- File upload ---
  document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "xlsx" || ext === "xls") {
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        document.getElementById("textInput").value = XLSX.utils.sheet_to_csv(ws);
      };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = function(e) { document.getElementById("textInput").value = e.target.result; };
      reader.readAsText(file);
    }
  });

  // --- Phrase counting ---
  function countPhrases(text) {
    const stopWords = new Set(document.getElementById("stopWords").value.toLowerCase().split(",").map(w => w.trim()).filter(Boolean));
    const N = Math.max(1, parseInt(document.getElementById("phraseLength").value) || 1);
    const cleaned = text.toLowerCase().replace(/[^\w\s]|[_]/g, "");
    const words = cleaned.split(/\s+/).filter(w => w.length > 0);
    const counts = {};
    for (let i = 0; i <= words.length - N; i++) {
      const phrase = words.slice(i, i + N).join(" ");
      const firstWord = words[i];
      if (N === 1 && stopWords.has(firstWord)) continue;
      if (N > 1 && stopWords.has(firstWord)) continue;
      counts[phrase] = (counts[phrase] || 0) + 1;
    }
    return { counts, total: words.length };
  }

  // --- Generate cloud and chart ---
  function generateCloud() {
    const text = document.getElementById("textInput").value;
    if (!text.trim()) {
      document.getElementById("wordCloud").innerHTML = '<p class="info-text" style="color:#d32f2f;">Please load from Sheets or enter some text first.</p>';
      return;
    }
    const { counts, total } = countPhrases(text);
    lastPhrases = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 75);
    document.getElementById("totalWordCount").textContent = total;
    document.getElementById("uniqueWordCount").textContent = lastPhrases.length;
    renderCloud();
    renderBar();
  }

  function renderCloud() {
    const cloud = document.getElementById("wordCloud");
    if (lastPhrases.length === 0) { cloud.innerHTML = '<p class="info-text">No phrases found.</p>'; return; }
    const maxC = lastPhrases[0][1], minC = lastPhrases[lastPhrases.length - 1][1];
    cloud.innerHTML = "";
    lastPhrases.forEach(([phrase, count], i) => {
      const el = document.createElement("span");
      el.textContent = phrase;
      el.className = "word-item";
      el.title = `Count: ${count}`;
      const size = maxC === minC ? 32 : 16 + 48 * ((count - minC) / (maxC - minC));
      el.style.fontSize = size + "px";
      const hue = Math.floor(Math.random() * 360);
      el.style.color = `hsl(${hue}, 80%, 45%)`;
      el.style.animationDelay = (i * 0.02) + "s";
      cloud.appendChild(el);
    });
  }

  function renderBar() {
    const bar = document.getElementById("barChart");
    if (lastPhrases.length === 0) { bar.innerHTML = ""; return; }
    const top = lastPhrases.slice(0, 20);
    const maxC = top[0][1];
    const barColors = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#1abc9c","#3498db","#9b59b6","#e91e63","#00bcd4","#8bc34a"];
    bar.innerHTML = top.map(([phrase, count], i) => {
      const pct = Math.round((count / maxC) * 100);
      const color = barColors[i % barColors.length];
      return `<div class="bar-row">
        <div class="bar-label" title="${phrase}">${phrase}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%; background:${color};">${count > 1 ? count : ""}</div>
        </div>
        <div class="bar-count">${count}</div>
      </div>`;
    }).join("");
  }

  // --- Toggle view ---
  function toggleView() {
    const cloud = document.getElementById("wordCloud");
    const bar = document.getElementById("barChart");
    const lc = document.getElementById("label-cloud");
    const lb = document.getElementById("label-bar");
    if (currentView === "cloud") {
      cloud.style.display = "none";
      bar.style.display = "block";
      lc.classList.remove("active");
      lb.classList.add("active");
      currentView = "bar";
    } else {
      cloud.style.display = "flex";
      bar.style.display = "none";
      lb.classList.remove("active");
      lc.classList.add("active");
      currentView = "cloud";
    }
  }

  function clearAll() {
    document.getElementById("textInput").value = "";
    document.getElementById("fileInput").value = null;
    document.getElementById("totalWordCount").textContent = "0";
    document.getElementById("uniqueWordCount").textContent = "0";
    document.getElementById("wordCloud").innerHTML = '<p class="info-text">Load from Sheets or enter text above, then click Generate Cloud</p>';
    document.getElementById("barChart").innerHTML = "";
    lastPhrases = [];
  }
</script>
</body>
</html>
